<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />-->
    <title>Chat</title>

    <!-- tailwindcss가 .container를 정의하고 있음 -->
    <script src="/static/js/tailwindcss.js"></script> <!--<script src="https://cdn.tailwindcss.com"></script>-->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/js/common.js?v={{ version }}"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> <!-- 아이콘, 체크 표시 -->
    <link rel="stylesheet" href="/static/css/style.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/chat.css?v={{ version }}">

<!--    <link rel="preload" href="/static/css/chat.abc123.css" as="style" onload="this.rel='stylesheet'">-->
<!--    <noscript><link rel="stylesheet" href="/static/css/chat.abc123.css"></noscript>-->

</head>
<body class="page-chat">
<div class="icon-buttons">
    <!--<button id="searchBtn btn-open-search" title="Search">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>-->
    <button id="toggleNotification">
        <i class="fa-solid fa-bell"></i>
    </button>
    <button id="videoCallBtn" title="Video Call">
        <i class="fas fa-video"></i>
    </button>
</div>
<!--<audio id="alert-sound" src="/static/sound/beep.mp3" preload="auto"></audio>-->
<div class="top-bar" data-auto-hide="true">
    <div class="back app-header__left">
        <a href="/" class="app-back">Back</a>
    </div>
    <div class="app-title chat-app-title">
        <span>Chat</span>
    </div>
    <div class="logout app-user-menu app-header__right chat-header-actions">
        <div class="chat-theme-menu" data-chat-theme-menu>
            <button type="button" class="chat-theme-toggle" aria-label="채팅 테마 변경" aria-expanded="false">
                <svg class="chat-theme-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3.25a8.75 8.75 0 0 0-8.75 8.75c0 4.83 3.92 8.75 8.75 8.75h1.05c1.13 0 1.74-1.31 1.03-2.18-.33-.41-.16-1.03.33-1.22l1.54-.59A5.77 5.77 0 0 0 19.75 11.35C19.75 6.88 16.28 3.25 12 3.25Zm-4.04 9.5a1.22 1.22 0 1 1 0-2.44 1.22 1.22 0 0 1 0 2.44Zm2.19-3.72a1.22 1.22 0 1 1 0-2.44 1.22 1.22 0 0 1 0 2.44Zm3.7 0a1.22 1.22 0 1 1 0-2.44 1.22 1.22 0 0 1 0 2.44Zm2.19 3.72a1.22 1.22 0 1 1 0-2.44 1.22 1.22 0 0 1 0 2.44Z"/>
                </svg>
            </button>
            <div class="chat-theme-panel" role="menu">
                <button type="button" data-chat-theme-option="kakao-dark">카톡 다크</button>
                <button type="button" data-chat-theme-option="kakao-light">카톡 라이트</button>
                <button type="button" data-chat-theme-option="whatsapp">WhatsApp 다크</button>
                <button type="button" data-chat-theme-option="imessage">기본 메시지</button>
            </div>
        </div>
        {% if current_user.is_authenticated %}
        <button type="button" class="app-menu-button" aria-label="사용자 메뉴" aria-expanded="false">☰</button>
        <div class="app-menu-panel" role="menu">
            <span class="app-menu-name">{{ current_user.get_id() }}</span>
            <a href="#" class="app-menu-info is-disabled" role="menuitem" aria-disabled="true" onclick="return false;">내 정보 <small>준비중</small></a>
            <a href="{{ url_for('auth.logout') }}" class="danger" role="menuitem">Logout</a>
        </div>
        {% endif %}
    </div>
</div>

<div id="user-count-indicator" class="chat-user-count" aria-label="접속자 수">
    <i class="fas fa-user" aria-hidden="true"></i>
    <span id="userCount">1</span>
</div>

<div class="container">
    <div id="chat-search-wrap" style="position:sticky; top:50px; z-index:10; display: none">
        <div id="chat-search-panel" hidden style="margin-top:8px; background:#fff; border:1px solid #ddd; border-radius:8px; padding:8px; display:flex; gap:8px; align-items:center;">
            <input id="chat-search-input" type="text" placeholder="검색어" style="flex:1; padding:6px 8px;">
            <button id="btn-run-search" type="button">검색</button>
            <button id="btn-prev-hit" type="button" disabled>▲</button>
            <span id="hit-counter" style="min-width:60px; text-align:center;">0/0</span>
            <button id="btn-next-hit" type="button" disabled>▼</button>
            <button id="btn-close-search" type="button">닫기</button>
        </div>
    </div>
    <!-- 채팅 메시지 목록 -->
    <div id="chat-container">
        {% for log in chat_logs %}
        <div class="message">
            {{ log }}
        </div>
        {% endfor %}
    </div>

    <!-- 입력 영역 -->
    <div id="typingIndicator" style="display: none; padding: 9px 0px 30px 30px;">
        <svg width="40" height="10" viewBox="0 0 120 30" xmlns="http://www.w3.org/2000/svg" fill="#555">
            <circle cx="15" cy="15" r="15">
                <animate attributeName="r" from="15" to="15"
                         begin="0s" dur="0.8s"
                         values="15;9;15" calcMode="linear"
                         repeatCount="indefinite" />
            </circle>
            <circle cx="60" cy="15" r="9" fill-opacity="0.3">
                <animate attributeName="r" from="9" to="9"
                         begin="0.2s" dur="0.8s"
                         values="9;15;9" calcMode="linear"
                         repeatCount="indefinite" />
            </circle>
            <circle cx="105" cy="15" r="15">
                <animate attributeName="r" from="15" to="15"
                         begin="0.4s" dur="0.8s"
                         values="15;9;15" calcMode="linear"
                         repeatCount="indefinite" />
            </circle>
        </svg>
    </div>

    <div class="flex items-center p-2 chat-bottom-input"> <!-- border-t -->
        <!--            <button id="camera-button" class="p-2 text-gray-500 hover:text-gray-700 w-[10%] mr-2">📷</button>-->
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="hidden" id="title" name="title" value="chat">
            <label for="file-input" class="p-2 text-gray-600 cursor-pointer w-[auto] mr-2 rounded-lg chat-bottom-btn">
                <!--📁-->
                ＋
            </label>
            <input type="file" name="files[]" id="file-input" multiple  class="hidden">
        </form>

        <!-- box-content: padding이 height에 포함되지 않도록 함 --> <!-- border -->
        <textarea type="text" id="chat-input" rows="1"
                  class="p-2 px-3 py-[6px] rounded-lg focus:outline-none w-[95%] box-content resize-none chat-bottom-btn"
                  placeholder="메세지 입력"
                  data-textarea-auto-resize="6"
        ></textarea>

        <button id="send-button" class="p-2 rounded-lg w-[auto] ml-2 chat-bottom-btn rounded-lg" aria-label="메세지 전송">
            <svg class="chat-send-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3.9 19.1L21 12 3.9 4.9 3 10.4 13.8 12 3 13.6l.9 5.5z"></path>
            </svg>
        </button>
    </div>

    <!-- 진행률 표시 영역 -->
    <div id="progressContainer" style="display: none;">
        <progress id="progressBar" value="0" max="100" style="width: 100%; height: 30%"></progress>
    </div>

</div>

<div class="link-preview" style="display: none">
    <div class="message" style="margin: 7px"></div>
    <a href="https://chickchick.kr" target="_blank" class="preview-card">
        <div class="preview-thumbnail">
            <img src="https://chickchick.kr/static/no-image.png" alt="썸네일">
        </div>
        <div class="preview-meta">
            <p class="preview-title">Example Title</p>
            <p class="preview-description"></p>
            <span class="preview-url">example.com</span>
        </div>
    </a>
</div>


<script>
    const username = "{{ username }}";
    const MAX_FETCH_MESSAGE_SIZE = "{{ maxFetchMessageSize }}";
</script>
<script src="/static/js/chat/chat_notification.js?v={{ version }}"></script>
<script src="/static/js/chat/video_call_window.js?v={{ version }}"></script>
<script src="/static/js/chat/upload_file.js?v={{ version }}"></script>
<script src="/static/js/chat/chat.js?v={{ version }}"></script>
<!--<script src="/static/js/chat/chat_search.js?v={{ version }}"></script>-->
<script src="/static/js/ui_chrome.js?v={{ version }}"></script>
<script src="/static/js/chat/chat_theme.js?v={{ version }}"></script>
</body>
</html>
