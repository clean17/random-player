<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Second Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}?v={{ version }}">
</head>
<body class="page-verify app-page">
<div class="top-bar" data-auto-hide="true">
    <div class="back app-header__left">
        <a href="{{ url_for('main.home') }}" class="app-back" aria-label="뒤로가기">Back</a>
    </div>
    <div class="app-title">Password</div>
    <div class="logout app-user-menu app-header__right">
        {% if current_user.is_authenticated %}
        <button type="button" class="app-menu-button" aria-label="사용자 메뉴" aria-expanded="false">☰</button>
        <div class="app-menu-panel" role="menu">
            <span class="app-menu-name">{{ current_user.get_id() }}</span>
            <a href="#" class="app-menu-info is-disabled" role="menuitem" aria-disabled="true" onclick="return false;">내 정보 <small>준비중</small></a>
            <a href="{{ url_for('auth.logout') }}" class="danger" role="menuitem">Logout</a>
        </div>
        {% endif %}
    </div>
</div>

<main class="verify-shell">
    <section class="verify-card">
        <form method="post">
            <label for="no-autofill"><h4>추가 패스워드 입력</h4></label>
            <input type="password" name="password" required class="input-size"
                   autocomplete="off"
                   autocorrect="off"
                   autocapitalize="off"
                   spellcheck="false"
                   id="no-autofill">
            <button type="submit" class="btn-w100">확인</button>
        </form>
    </section>
</main>

<script src="/static/js/ui_chrome.js?v={{ version }}"></script>
<script>
    document.querySelector('input[name="password"]').focus();
</script>
</body>
</html>
