<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>게시글 수정</title>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
    <link rel="stylesheet" href="/static/css/style.css?v={{ version }}">
    <link rel="stylesheet" href="/static/css/post.css?v={{ version }}">
    <script src="/static/js/common.js?v={{ version }}"></script>
</head>
<body>

<form class="container" id="post-form" action="{% if type == 'C' %}/posts/create{% elif type == 'U' %}/posts/{{ post_id }}/edit{% endif %}"
      method="post">
    <div class="form-group">
        <div class="post-info">
            <div class="edit-post-title">
                <input type="text" name="title" id="title" value="{{ post.title if post else ''}}" required placeholder="제목을 입력하세요">
            </div>
        </div>
    </div>
    <!--<div class="form-group">
        <label for="content">첨부</label>
        <input type="file" name="file" id="file"/>
    </div>-->
    <div class="form-group textarea-wrapper">
<!--        <textarea name="content" id="content" required placeholder="Enter the contents">{{ post.content if post else ''}}</textarea>-->
        <div id="editor"></div>
        <input type="hidden" name="content" id="content-input">
    </div>
    <div class="form-actions">
        {% if post %}
        <a href="/posts/{{ post.id }}">
            <button type="button" class="btn btn-secondary">나가기</button>
        </a>
        {% else %}
        <a href="/posts/">
            <button type="button" class="btn btn-secondary">나가기</button>
        </a>
        {% endif %}
        <button type="submit" class="btn btn-main">
            {% if type == 'C' %}등록{% elif type == 'U' %}수정완료{% endif %}
        </button>
        <button type="button" class="btn-secondary" onclick="window.location.href='/posts'">목록으로</button>
    </div>
</form>
</body>
<script>
    const form = document.getElementById('post-form');
    const contentInput = document.getElementById('content-input');
    const toolbarOptions = [
        [{ 'header': [1, 2, 3, false] }],              // <h1>, <h2>, <h3>, 기본
        ['bold', 'italic', 'underline', 'strike'],     // 굵게, 기울임, 밑줄, 취소선
        [{ 'color': [] }, { 'background': [] }],       // 글자색, 배경색
        [{ 'list': 'ordered' }, { 'list': 'bullet' }], // 번호 매겨진 목록 (1. 2. 3.…), 점 목록 (• • •)
        ['link', 'image', /*'video'*/],                    // 하이퍼링크, 이미지, 비디오
        ['clean']                                      // 포맷 제거 버튼 (Clear formatting) > 순수 텍스트로
    ];
    const quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: '내용을 입력하세요...',
        modules: {
            toolbar: {
                container: toolbarOptions,
                handlers: {
                    image: imageHandler,
                    // video: videoHandler
                }
            }
        }
    });


    // ----------------------------
    // 🔥 수정 모드일 때 초기값 채우기
    // ----------------------------
    {% if type == 'U' and post %}
    const html = {{ post.content|tojson|safe }};
    quill.root.innerHTML = html;
    {% endif %}

    form.addEventListener('submit', function () {
        // 1) HTML로 저장하고 싶으면:
        contentInput.value = quill.root.innerHTML;

        // 2) Delta(JSON)으로 저장하고 싶으면:
        // contentInput.value = JSON.stringify(quill.getContents());
    });

    // Quill 초기화 뒤쪽에 붙이면 됨
    quill.root.addEventListener('paste', async (e) => {
        const clipboardData = e.clipboardData || window.clipboardData;
        if (!clipboardData) return;

        const imageFiles = [];

        // 1) files에 이미지가 여러 개 들어온 경우 (탐색기에서 파일 복사 등)
        if (clipboardData.files && clipboardData.files.length > 0) {
            for (let i = 0; i < clipboardData.files.length; i++) {
                const file = clipboardData.files[i];
                if (file.type && file.type.startsWith('image/')) {
                    imageFiles.push(file);
                }
            }
        } else {
            // 2) files가 비어있을 때만 items에서 이미지 찾기 (캡처/그림판 등)
            const items = clipboardData.items;
            if (items && items.length > 0) {
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    if (item.kind === 'file' && item.type.startsWith('image/')) {
                        const file = item.getAsFile();
                        if (file) imageFiles.push(file);
                    }
                }
            }
        }

        // 이미지가 아예 없으면 기본 붙여넣기 그대로
        if (imageFiles.length === 0) return;

        // 이미지 있으면 Quill 기본 paste 동작 막고 우리가 처리
        e.preventDefault();

        let range = quill.getSelection(true);
        if (!range) {
            range = { index: quill.getLength(), length: 0 };
        }

        // /upload는 한 번에 하나씩
        for (const file of imageFiles) {
            const imageUrl = await uploadImage(file);
            if (!imageUrl) continue;

            quill.insertEmbed(range.index, 'image', imageUrl);
            range.index += 1;
            quill.setSelection(range.index);
        }
    });


    async function uploadImage(file) {
        if (!file) return null;

        const formData = new FormData();
        formData.append('files[]', file);

        renderLoadingOverlay();
        const res = await fetch('/upload', {
            method: 'POST',
            body: formData
        });
        removeLoadingOverlay();

        if (!res.ok) {
            alert('이미지 업로드 실패');
            return null;
        }

        const data = await res.json();
        // 서버에서 여러 파일을 돌려줬다면 첫 번째 것만 쓴다고 가정
        const first = data.files && data.files[0];
        return first ? first.url : null;
    }

    function imageHandler() {
        const input = document.createElement('input');
        input.setAttribute('type', 'file');
        input.setAttribute('accept', 'image/*');
        input.click();

        input.onchange = async () => {
            const file = input.files[0];
            if (!file) return;

            const imageUrl = await uploadImage(file);
            if (!imageUrl) return;

            const range = quill.getSelection(true) || { index: quill.getLength(), length: 0 };
            quill.insertEmbed(range.index, 'image', imageUrl);
            quill.setSelection(range.index + 1);
        };
    }

</script>
